name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_PORT: ${{ secrets.PROD_PORT }}
      PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
    steps:
      - name: Validate deploy secrets
        run: |
          test -n "$PROD_HOST"
          test -n "$PROD_USER"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${PROD_PORT:-22}" -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Run production deploy
        run: |
          APP_DIR="${PROD_APP_DIR:-/var/www/vhosts/pure-therapeutic-art-therapy.com/pure-therapeutic-art/current}"
          ssh -p "${PROD_PORT:-22}" "${PROD_USER}@${PROD_HOST}" \
            "export APP_DIR='${APP_DIR}'; export DEPLOY_BRANCH='main'; export REPO_REMOTE='origin'; bash '${APP_DIR}/deploy/update-server-from-git.sh'"
